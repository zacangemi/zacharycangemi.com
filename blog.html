    <div class="blog__container">
        <div class="blog__posts" id="blog-posts-container">
            <!-- Blog posts will be loaded automatically from wordpress -->
             <div id="loading-message">
                <p>Loading latest posts ...</p>
             </div>
        </div>
    </div>

    <script>
        // WordPress API endpoint for your blog
        const WORDPRESS_API_URL = 'https://public-api.wordpress.com/rest/v1.1/sites/blog.zacharycangemi.com/posts/';
        
        // Function to truncate text to specified length
        function truncateText(text, maxLength = 280) {
            if (text.length <= maxLength) return text;
            
            // Find the last space within the limit to avoid cutting words
            let truncated = text.substr(0, maxLength);
            let lastSpace = truncated.lastIndexOf(' ');
            
            // If no space found or very close to start, just cut at limit
            if (lastSpace < maxLength * 0.8) {
                return truncated.trim() + '...';
            }
            
            return truncated.substr(0, lastSpace).trim() + '...';
        }
        
        // Function to format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
        
        // Function to strip HTML tags from content
        function stripHtml(html) {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            return temp.textContent || temp.innerText || '';
        }
        
        // Function to create a blog post card.
        // Uses DOM construction with textContent (not innerHTML) so post fields
        // from the WordPress API can never be interpreted as HTML/JS — closes
        // the XSS surface that template-string interpolation would otherwise open.
        function createBlogCard(post) {
            const article = document.createElement('article');
            article.className = 'blog__post';
            article.style.cursor = 'pointer';
            article.addEventListener('click', () => {
                window.open(post.URL, '_blank', 'noopener,noreferrer');
            });

            const title = document.createElement('h2');
            title.className = 'blog__post-title';
            title.textContent = post.title;

            const date = document.createElement('p');
            date.className = 'blog__post-date';
            date.textContent = formatDate(post.date);

            const excerpt = document.createElement('p');
            excerpt.className = 'blog__post-excerpt';
            excerpt.textContent = truncateText(stripHtml(post.content));

            article.appendChild(title);
            article.appendChild(date);
            article.appendChild(excerpt);
            return article;
        }
        
        // Function to load blog posts from WordPress
        async function loadBlogPosts() {
            try {
                const response = await fetch(WORDPRESS_API_URL);
                if (!response.ok) {
                    throw new Error('Failed to fetch posts');
                }
                
                const data = await response.json();
                const posts = data.posts;
                
                const container = document.getElementById('blog-posts-container');
                const loadingMessage = document.getElementById('loading-message');
                
                if (posts && posts.length > 0) {
                    // Remove loading message
                    loadingMessage.remove();

                    // Append each card as a real DOM node (no innerHTML, no string injection)
                    posts.forEach(post => container.appendChild(createBlogCard(post)));
                } else {
                    loadingMessage.textContent = 'No posts found. Check back soon!';
                }
                
            } catch (error) {
                console.error('Error loading blog posts:', error);
                const loadingMessage = document.getElementById('loading-message');
                loadingMessage.innerHTML = '<p>Unable to load posts. Please try again later.</p>';
            }
        }
        
        // Load posts when page loads
        document.addEventListener('DOMContentLoaded', loadBlogPosts);
    </script>
