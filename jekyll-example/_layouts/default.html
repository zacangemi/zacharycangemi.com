<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ page.title | default: site.title }}</title>
    
    <!-- Your existing retro surf styling -->
    <link rel="stylesheet" href="{{ '/css/blog-style.css' | relative_url }}">
    <link rel="icon" type="image/gif" href="{{ '/css/images/surfboards/surfer_mirrored.gif' | relative_url }}">
    
    <!-- VT323 font to match your portfolio -->
    <link href="https://fonts.googleapis.com/css?family=VT323" rel="stylesheet">
</head>
<body>
    
    <!-- Header with your retro styling -->
    <header>
        <h1 class="blogHeader">{{ site.title }}</h1>
        
        <!-- Navigation matching your current site -->
        <nav>
            <ul class="nav__list">
                <li><a class="nav__links" href="/">Home</a></li>
                <p>·</p>
                <li><a class="nav__links" href="/about">About</a></li>
                <p>·</p>
                <li><a class="nav__links" href="/posts">All Posts</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main content area -->
    <main>
        {{ content }}
    </main>

    <!-- Footer with your social links -->
    <footer>
        <div class="social">
            <ul>
                <li>
                    <a class="social__link" href="https://github.com/{{ site.social_links.github }}" target="_blank">
                        <img src="{{ '/css/images/socials/github.png' | relative_url }}" alt="github">
                        <span>GitHub</span>
                    </a>
                </li>
                <li>
                    <a class="social__link" href="https://linkedin.com/in/{{ site.social_links.linkedin }}" target="_blank">
                        <img src="{{ '/css/images/socials/linkedin.png' | relative_url }}" alt="linkedin">
                        <span>LinkedIn</span>
                    </a>
                </li>
            </ul>
        </div>
    </footer>

</body>
</html>
