# Basic Jekyll Configuration for Your Blog
title: "Zachary Cangemi's Blog"
description: "Thoughts on AI, hardware, bitcoin, and brain emulation"
baseurl: "/blog"
url: "https://yourusername.github.io"

# Author Info
author:
  name: "Zachary Cangemi"
  email: "your-email@example.com"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

# Navigation
navigation:
  - name: "Home"
    link: "/"
  - name: "About"
    link: "/about/"
  - name: "Posts"
    link: "/posts/"

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Zachary Cangemi"

# Social Links (to match your current site)
social_links:
  github: zcangemi
  linkedin: zachary-cangemi-0a08b4b1